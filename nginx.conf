server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(js|wasm|html|css)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.wasm$ {
        types { application/wasm wasm; }
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
