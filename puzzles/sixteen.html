<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="../favicon.svg"><title>Sixteen - Puzzels</title>
<script defer src="sixteen.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1rem;
    background: #1e293b;
    border-bottom: 1px solid #334155;
  }

  .topbar a {
    color: #818cf8;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .topbar a:hover { color: #a5b4fc; }

  .topbar h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: #f8fafc;
  }

  main { text-align: center; }

  #gamemenu {
    margin: 0.75rem auto 0.5rem;
    font-weight: bold;
    font-size: 0.8em;
    text-align: center;
  }

  #gamemenu ul {
    list-style: none;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0;
    padding: 0.5px;
  }

  #gamemenu li {
    cursor: default;
    border: 1px solid #475569;
    margin: -0.5px;
    position: relative;
    color: #e2e8f0;
  }

  #gamemenu li[role=separator] {
    width: 1.5em;
    border: 0;
  }

  #gamemenu li > * {
    padding: 0.2em 0.75em;
    margin: 0;
    display: block;
  }

  #gamemenu :disabled { color: rgba(255,255,255,0.3); }

  #gamemenu li > :hover:not(:disabled),
  #gamemenu li > .focus-within {
    background: rgba(255,255,255,0.15);
  }

  @media (max-width:18em) {
    .verbiage { display: none; }
  }

  #gamemenu ul ul {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    flex-direction: column;
    background: #1e293b;
    border: 1px solid #475569;
    z-index: 50;
  }

  #gamemenu ul ul.left { left: inherit; right: 0; }

  #gamemenu li li {
    white-space: nowrap;
    text-align: left;
  }

  #gamemenu ul ul ul { top: 0; left: 100%; }
  #gamemenu ul ul ul.left { left: inherit; right: 100%; }

  #gamemenu :hover > ul,
  #gamemenu .focus-within > ul {
    display: flex;
  }

  #gamemenu button {
    -moz-appearance: none;
    -webkit-appearance: none;
    appearance: none;
    font: inherit;
    color: inherit;
    background: initial;
    border: initial;
    text-align: inherit;
    width: 100%;
    cursor: pointer;
  }

  #gamemenu .tick {
    -moz-appearance: none;
    -webkit-appearance: none;
    appearance: none;
    margin: initial;
    font: inherit;
  }

  #gamemenu .tick::before { content: "\2713"; }
  #gamemenu .tick:not(:checked) { color: transparent; }

  #gamemenu li > div:after {
    content: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='10'%20height='10'%3E%3Cpolygon%20points='0,5,10,5,5,10'%20fill='%23e2e8f0'/%3E%3C/svg%3E");
    margin-left: 0.5em;
  }

  #gamemenu li li > div:after {
    content: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='10'%20height='10'%3E%3Cpolygon%20points='0,0,10,5,0,10'%20fill='%23e2e8f0'/%3E%3C/svg%3E");
    float: right;
  }

  #statusbar {
    overflow: hidden;
    text-align: left;
    white-space: nowrap;
    text-overflow: ellipsis;
    background: #334155;
    color: #e2e8f0;
    border: 1px solid #475569;
    height: 1.4em;
    font-size: 0.9em;
    padding: 0 0.3em;
  }

  #dlgdimmer {
    width: 100%; height: 100%;
    background: #000;
    position: fixed;
    opacity: 0.5;
    left: 0; top: 0;
    z-index: 99;
  }

  #dlgform {
    width: 66.6667vw;
    background: #1e293b;
    color: #e2e8f0;
    position: absolute;
    border: 1px solid #475569;
    border-radius: 8px;
    padding: 20px;
    top: 10vh;
    left: 16.6667vw;
    z-index: 100;
  }

  #dlgform h2 { margin-top: 0; }

  #dlgform input[type="text"] {
    background: #0f172a;
    color: #e2e8f0;
    border: 1px solid #475569;
    border-radius: 4px;
    padding: 0.3em 0.5em;
  }

  #dlgform button {
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 0.3em 1em;
    cursor: pointer;
    margin: 0.2em;
  }

  #dlgform button:hover { background: #818cf8; }

  #resizehandle {
    position: absolute;
    z-index: 1;
    bottom: 0; right: 0;
    cursor: se-resize;
    color: #64748b;
  }

  #resizable {
    position: relative;
    margin: 0.75rem auto;
  }

  #puzzlecanvas {
    display: block;
    width: 100%;
    font-family: sans-serif;
  }

  #apology {
    padding: 0 1em;
    margin: 1em;
    border: 2px solid #ef4444;
    border-radius: 8px;
    color: #fca5a5;
  }

  .apology-title { text-align: center; }

  #permalink-desc, #permalink-seed {
    color: #818cf8;
    text-decoration: none;
    font-size: 0.85rem;
    margin: 0 0.3em;
  }

  @media print {
    #gamemenu, #resizehandle, .topbar { display: none; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="../">&larr; Alle puzzels</a>
  <h1>Sixteen</h1>
</div>

<main id="puzzle" style="display: none">
<form id="gamemenu"><ul>
  <li><div tabindex="0">Game<ul>
    <li><button type="button" id="specific">Enter game ID...</button></li>
    <li><button type="button" id="random">Enter random seed...</button></li>
    <li><button type="button" id="save">Download save file...</button></li>
    <li><button type="button" id="load">Upload save file...</button></li>
    <li><button type="button" id="prefs">Preferences...</button></li>
  </ul></div></li>
  <li><div tabindex="0">Type<ul role="menu" id="gametype"></ul></div></li>
  <li role="separator"></li>
  <li><button type="button" id="new">New<span class="verbiage"> game</span></button></li>
  <li><button type="button" id="restart">Restart<span class="verbiage"> game</span></button></li>
  <li><button type="button" id="undo">Undo<span class="verbiage"> move</span></button></li>
  <li><button type="button" id="redo">Redo<span class="verbiage"> move</span></button></li>
  <li><button type="button" id="solve">Solve<span class="verbiage"> game</span></button></li>
</ul></form>
  <div id="resizable">
    <canvas id="puzzlecanvas" tabindex="0"></canvas>
    <div id="statusbar"></div>
    <svg id="resizehandle" aria-label="resize" width="10" height="10">
      <path d="M8.5,1.5l-7,7m7,-4l-4,4m4,-1l-1,1" stroke="currentColor" stroke-linecap="round"></path>
    </svg>
  </div>
  <p>
    <a id="permalink-desc">Link by game ID</a>
    <a id="permalink-seed">Link by random seed</a>
  </p>
</main>
<div id="apology">
  <p class="apology-title"><strong>WebAssembly wordt geladen...</strong></p>
  <p>Als dit bericht zichtbaar blijft, ondersteunt je browser mogelijk geen WebAssembly.</p>
</div>

<script src="scores.js"></script></body>
</html>
